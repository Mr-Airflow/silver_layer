# resources/silver_pipeline_job.yml
# Databricks Asset Bundle job definition — Silver Layer Bulk Pipeline
#
# AUTO-GENERATED by scripts/generate_job_yml.py — do not edit manually.
# Re-run the script whenever silver_config.csv changes:
#
#   python scripts/generate_job_yml.py
#   databricks bundle deploy
#
# Tasks included: validate, transform, data_quality, governance, audit, optimize
# Enabled rows  : 4
# Stage flags   : DQ=True  Gov=True  Audit=True  Optimize=True

resources:
  jobs:

    silver_layer_pipeline:
      name: "[${bundle.target}] Silver - Bulk Transform Pipeline"
      description: >
        CSV-driven Bronze->Silver pipeline.
        All config details are driven by parameter.yml and the config Delta table.
        Run scripts/generate_job_yml.py before deploying to include only tasks
        whose stage flag is enabled in silver_config.csv.

      email_notifications:
        on_failure:
          - ${var.notification_email}
        on_start:   []
        on_success: []

      max_concurrent_runs: 1

      parameters:
        - name: filter_ids
          default: ""

      environments:
        - environment_key: silver_env
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml>=6.0
              - databricks-labs-dqx
              - databricks-sdk

      tasks:

        # STAGE 0 - VALIDATE (always runs)
        - task_key: validate
          description: "Pre-flight: infra setup, CSV->Delta, source checks, publish stage flags"
          environment_key: silver_env
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/stages/00_validate
            base_parameters:
              config_base_path: ${workspace.file_path}
              filter_ids:       ""
          max_retries: 0
          timeout_seconds: 600

        # STAGE 1 - TRANSFORM (always runs after validate)
        - task_key: transform
          description: "Read Bronze, apply SQL transforms, write Silver, update watermark"
          depends_on:
            - task_key: validate
          environment_key: silver_env
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/stages/01_transform
            base_parameters:
              config_base_path: ${workspace.file_path}
              filter_ids:       ""
              stop_on_error:    "false"
          max_retries: 1
          min_retry_interval_millis: 300000
          timeout_seconds: 3600

        # STAGE 2 - DATA QUALITY (conditional: run_data_quality=true)
        - task_key: data_quality
          description: "DQX quality scan for tables with run_data_quality=true"
          depends_on:
            - task_key: transform
          environment_key: silver_env
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/stages/02_data_quality
            base_parameters:
              config_base_path: ${workspace.file_path}
              filter_ids:       ""
          max_retries: 0
          timeout_seconds: 1800

        # STAGE 3 - GOVERNANCE (conditional: run_governance=true)
        - task_key: governance
          description: "Unity Catalog governance for tables with run_governance=true"
          depends_on:
            - task_key: data_quality
          environment_key: silver_env
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/stages/03_governance
            base_parameters:
              config_base_path: ${workspace.file_path}
              filter_ids:       ""
          max_retries: 0
          timeout_seconds: 900

        # STAGE 4 - AUDIT (conditional: run_audit=true)
        # Also marks is_processed=True for completed rows.
        - task_key: audit
          description: "Write audit records + mark is_processed=True for tables with run_audit=true"
          depends_on:
            - task_key: transform
            - task_key: data_quality
            - task_key: governance
          environment_key: silver_env
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/stages/04_audit
            base_parameters:
              config_base_path: ${workspace.file_path}
              filter_ids:       ""
          max_retries: 0
          timeout_seconds: 300

        # STAGE 5 - OPTIMIZE (conditional: run_optimize=true)
        - task_key: optimize
          description: "OPTIMIZE + ZORDER + VACUUM for tables with run_optimize=true"
          depends_on:
            - task_key: transform
          environment_key: silver_env
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/stages/05_optimize
            base_parameters:
              config_base_path: ${workspace.file_path}
              filter_ids:       ""
          max_retries: 0
          timeout_seconds: 3600
