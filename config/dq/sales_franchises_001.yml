# dq/sales_franchises_001.yml — Data Quality Rules for Silver Franchises

data_quality:

  quarantine_table:      "cdl_silver.data_quality.franchises_quarantine"
  dq_results_table:      "cdl_silver.data_quality.dq_results_franchises"
  failure_threshold_pct: 5.0

  checks:

    # COMPLETENESS

    - name: "franchise_id_not_null"
      criticality: "error"
      user_metadata:
        check_category: "completeness"
        check_owner: "praveenfaa@gmail.com"
      check:
        function: is_not_null
        arguments:
          column: franchiseID

