# data_quality.yml — Data Quality Rules (Databricks DQX Framework)

data_quality:

  #  Output Tables 
  quarantine_table:  "cdl_silver.data_quality.customers_quarantine"   
  dq_results_table:  "cdl_silver.data_quality.dq_results_customers"   

 
  failure_threshold_pct: 5.0

  checks:

    # COMPLETENESS CHECKS — required fields must not be null/empty

    - name: "customer_id_not_null"
      criticality: "error"
      user_metadata:
        check_category: "completeness"
        check_owner: "praveenfaa@gmail.com"
      check:
        function: is_not_null
        arguments:
          column: customer_id

