# governance/sales_franchises_001.yml — Governance Configuration for Silver Franchises

governance:

  # Owner is the admin user directly (no group required).
  table_owner:  "praveen.yadav@aidetic.in"
  data_steward: "praveen.yadav@aidetic.in"

  table_tags:
    domain:              "retail_franchises"
    data_classification: "internal"
    owner_team:          "data_engineering"
    pii_present:         "false"
    sla_tier:            "tier2"
    layer:               "silver"
    source_system:       "bakehouse"
    env:                 "prod"

  #  Table Access Grants
  grants:
    - principal:   "praveen.yadav@aidetic.in"
      privileges:
        - "ALL_PRIVILEGES"
      principal_type: "user"

    - principal:   "aayushmahajan@aidetic.in"
      privileges:
        - "SELECT"
      principal_type: "user"

audit:
  enabled: true
  audit_table: "cdl_silver.logging.silver_audit_log"